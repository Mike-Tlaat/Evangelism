<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الاختبارات التفاعلية الموحدة | الدرس الأساسي</title>
    <!-- خط Cairo الفاخر من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #070a13;
            --mesh-bg: radial-gradient(at 0% 0%, rgba(220, 38, 38, 0.1) 0px, transparent 50%),
                       radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.08) 0px, transparent 50%);
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-inner-bg: rgba(255, 255, 255, 0.02);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent-color: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.25);
            --success-color: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger-color: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --mesh-bg: radial-gradient(at 0% 0%, rgba(239, 68, 68, 0.05) 0px, transparent 50%),
                       radial-gradient(at 100% 100%, rgba(180, 83, 9, 0.05) 0px, transparent 50%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(15, 23, 42, 0.08);
            --card-inner-bg: rgba(15, 23, 42, 0.02);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --accent-color: #b45309;
            --accent-glow: rgba(180, 83, 9, 0.15);
            --success-color: #059669;
            --success-bg: rgba(5, 150, 105, 0.08);
            --danger-color: #dc2626;
            --danger-bg: rgba(220, 38, 38, 0.06);
            --shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: var(--mesh-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 20px 80px 20px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* شريط العدادات العلوي الثابت البصري */
        .scoreboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .score-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .score-card .label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .score-card .value {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .score-card.correct { border-color: var(--success-color); color: var(--success-color); }
        .score-card.incorrect { border-color: var(--danger-color); color: var(--danger-color); }
        .score-card.progress-tracker { border-color: var(--accent-color); color: var(--accent-color); }

        /* منطقة الهيدر والعناوين */
        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 1rem;
        }

        /* كرت السؤال الزجاجي */
        .quiz-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .section-badge {
            align-self: flex-start;
            background: var(--card-inner-bg);
            border: 1px solid var(--glass-border);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.7;
            color: var(--text-primary);
            margin-bottom: 25px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: var(--card-inner-bg);
            border: 1px solid var(--glass-border);
            padding: 16px 22px;
            border-radius: 14px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-color);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        [data-theme="light"] .option-btn:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.03);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* حالات الاختيارات صح / غلط */
        .option-btn.correct-choice {
            background: var(--success-bg) !important;
            border-color: var(--success-color) !important;
            color: var(--success-color) !important;
            font-weight: 700;
        }

        .option-btn.incorrect-choice {
            background: var(--danger-bg) !important;
            border-color: var(--danger-color) !important;
            color: var(--danger-color) !important;
            font-weight: 700;
        }

        /* صندوق الملاحظات والتنبيهات التفاعلية الفورية */
        .feedback-box {
            margin-top: 25px;
            padding: 18px 22px;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-box.success {
            background: var(--success-bg);
            border-right: 4px solid var(--success-color);
            color: var(--success-color);
            display: block;
        }

        .feedback-box.danger {
            background: var(--danger-bg);
            border-right: 4px solid var(--danger-color);
            color: var(--danger-color);
            display: block;
        }

        /* أزرار التحكم والتحويل */
        .control-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .next-btn {
            background: var(--accent-color);
            border: none;
            color: #000;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px var(--accent-glow);
            transition: all 0.2s ease;
            display: none;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        /* كرت النتيجة النهائي الشامل */
        .result-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 45px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            display: none;
            animation: scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .status-badge {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 100px;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .status-badge.passed {
            background: var(--success-bg);
            color: var(--success-color);
            border: 2px solid var(--success-color);
        }

        .status-badge.failed {
            background: var(--danger-bg);
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
        }

        .result-metric {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .result-details {
            font-size: 1.3rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .restart-btn {
            background: transparent;
            border: 2px solid var(--text-primary);
            color: var(--text-primary);
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        /* زر المظهر الطافي */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) {
            .scoreboard { gap: 8px; }
            .score-card { padding: 10px; }
            .score-card .value { font-size: 1.2rem; }
            .quiz-card { padding: 25px 15px; }
            .question-text { font-size: 1.1rem; }
            .option-btn { font-size: 0.95rem; padding: 14px 16px; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <div class="container">
        
        <!-- نظام مراقبة وحساب النقاط الحي بالاعلى -->
        <div class="scoreboard" id="scoreboardArea">
            <div class="score-card correct">
                <div class="label">الإجابات الصحيحة</div>
                <div class="value" id="correctCount">0</div>
            </div>
            <div class="score-card progress-tracker">
                <div class="label">التقدم الحالي</div>
                <div class="value" id="progressText">1 / 50</div>
            </div>
            <div class="score-card incorrect">
                <div class="label">الإجابات الخاطئة</div>
                <div class="value" id="incorrectCount">0</div>
            </div>
        </div>

        <header id="headerArea">
            <h1>منظومة التدريب والاختبار الإلزامية</h1>
            <p>مهرجان الكرازة الموحد - ركيزة العقيدة والطقس والروح</p>
        </header>

        <!-- واجهة الأسئلة النشطة -->
        <div id="quizInterface">
            <div class="quiz-card">
                <div>
                    <div class="section-badge" id="sectionBadge">جاري التحميل...</div>
                    <div class="question-text" id="questionText">جاري تحميل السؤال...</div>
                    <div class="options-container" id="optionsContainer">
                        <!-- الخيارات تولد ديناميكياً -->
                    </div>
                </div>
                
                <div>
                    <div class="feedback-box" id="feedbackBox"></div>
                    <div class="control-actions">
                        <button class="next-btn" id="nextBtn" onclick="loadNextQuestion()">السؤال التالي ➔</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- واجهة النتائج الختامية الشاملة -->
        <div class="result-card" id="resultInterface">
            <div class="status-badge" id="statusBadge">ناجح</div>
            <div class="result-metric" id="percentageValue">0%</div>
            <div class="result-details" id="resultDetails">
                لقد حصلت على درجة 0 من 50.
            </div>
            <button class="restart-btn" onclick="restartQuiz()">إعادة محاولة الاختبار</button>
        </div>

    </div>

        let currentQuestionIdx = 0;
        let totalCorrect = 0;
        let totalIncorrect = 0;

        // دالة تشغيل وتحميل السؤال الحالي
        function loadQuestion() {
            if (currentQuestionIdx >= questionsDatabase.length) {
                showFinalResults();
                return;
            }

            const currentQ = questionsDatabase[currentQuestionIdx];
            
            // تحديث العدادات الفورية بالاعلى وبنية الكرت
            document.getElementById('progressText').innerText = `${currentQuestionIdx + 1} / ${questionsDatabase.length}`;
            document.getElementById('sectionBadge').innerText = currentQ.section;
            document.getElementById('questionText').innerText = currentQ.q;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const feedbackBox = document.getElementById('feedbackBox');
            feedbackBox.className = 'feedback-box';
            feedbackBox.style.display = 'none';
            
            document.getElementById('nextBtn').style.display = 'none';

            // بناء خيارات الإجابة هندسياً وتفاعلياً
            currentQ.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(idx);
                container.appendChild(btn);
            });
        }

        // دالة التعامل مع معطيات اختيار المستخدم ومعالجتها الفورية
        function selectAnswer(selectedIdx) {
            const currentQ = questionsDatabase[currentQuestionIdx];
            const container = document.getElementById('optionsContainer');
            const buttons = container.getElementsByClassName('option-btn');
            const feedbackBox = document.getElementById('feedbackBox');

            // قفل كافة الأزرار لمنع التلاعب وتغيير النتيجة بعد الاختيار
            for (let btn of buttons) {
                btn.disabled = true;
            }

            if (selectedIdx === currentQ.correct) {
                // معالجة اختيار صحيح
                buttons[selectedIdx].classList.add('correct-choice');
                totalCorrect++;
                document.getElementById('correctCount').innerText = totalCorrect;
                
                feedbackBox.innerText = `✓ صحيح! ${currentQ.feedback}`;
                feedbackBox.className = 'feedback-box success';
            } else {
                // معالجة اختيار خاطئ وإظهار رسائل التحذير الحازمة والموحدة للمهرجان
                buttons[selectedIdx].classList.add('incorrect-choice');
                buttons[currentQ.correct].classList.add('correct-choice'); // إبراز الصح للمستخدم للتعليم
                totalIncorrect++;
                document.getElementById('incorrectCount').innerText = totalIncorrect;
                
                feedbackBox.innerText = `✕ إجابة خاطئة! الإجابة الصحيحة هي: ${currentQ.options[currentQ.correct]}\n\nتنبيه حرج للغاية: تذكر أن حصد الأخطاء والفشل في تعدية وتخطي هذا الامتحان الأساسي سيحرمك تماماً ولن تتمكن من تسجيل أو ممارسة أي نشاط كنسي أو خدمي في مهرجان الكرازة!`;
                feedbackBox.className = 'feedback-box danger';
            }

            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        // الانتقال للسؤال التالي بنعومة وسلاسة
        function loadNextQuestion() {
            currentQuestionIdx++;
            loadQuestion();
        }

        // عرض شاشة التقرير الختامي الشامل وحساب المعدل المئوي والنجاح من عدمه
        function showFinalResults() {
            document.getElementById('quizInterface').style.display = 'none';
            document.getElementById('scoreboardArea').style.display = 'none';
            document.getElementById('headerArea').style.display = 'none';
            
            const resultInterface = document.getElementById('resultInterface');
            resultInterface.style.display = 'block';

            const rawScore = totalCorrect; 
            const percentage = Math.round((rawScore / 50) * 100);
            
            document.getElementById('percentageValue').innerText = `${percentage}%`;
            
            const statusBadge = document.getElementById('statusBadge');
            const detailsBox = document.getElementById('resultDetails');

            // شرط النجاح الإلزامي المعتمد من 50% فما فوق (أي 25 درجة صحيحة على الأقل من 50)
            if (percentage >= 50) {
                statusBadge.innerText = "ناجح ومؤهل للتسجيل";
                statusBadge.className = "status-badge passed";
                detailsBox.innerHTML = `مبارك لك! لقد نلت درجة <strong style='color:var(--success-color); font-size:1.5rem;'>${rawScore}</strong> من أصل 50 درجة كاملة.<br>أنت الآن مسجل رسمياً ومؤهل لدخول كافة الأنشطة والخدمات والفعاليات الجماعية بمهرجان الكرازة بنجاح وبدون قيود.`;
            } else {
                statusBadge.innerText = "راسب - غير مؤهل للتسجيل";
                statusBadge.className = "status-badge failed";
                detailsBox.innerHTML = `للأسف الشديد، لقد حصلت على درجة <strong style='color:var(--danger-color); font-size:1.5rem;'>${rawScore}</strong> من 50.<br><span style='color:var(--danger-color); font-weight:800;'>تحذير إلزامي: بناءً على هذه النتيجة، فقد فشلت في عبور الامتحان الأساسي الموحد، وبالتالي يقع عليك الحظر ولن تتمكن من تسجيل أو تفعيل أي نشاط أو خدمة في مهرجان الكرازة الحالي حتى تعيد الدراسة وتجتاز الاختبار بنجاح.</span>`;
            }
        }

        // دالة تصفير العدادات وإعادة تشغيل محاكاة الاختبار من جديد
        function restartQuiz() {
            currentQuestionIdx = 0;
            totalCorrect = 0;
            totalIncorrect = 0;
            
            document.getElementById('correctCount').innerText = '0';
            document.getElementById('incorrectCount').innerText = '0';
            
            document.getElementById('quizInterface').style.style = '';
            document.getElementById('quizInterface').style.display = 'block';
            document.getElementById('scoreboardArea').style.display = 'grid';
            document.getElementById('headerArea').style.display = 'block';
            document.getElementById('resultInterface').style.display = 'none';
            
            loadQuestion();
        }

        // نظام تبديل المظهر الزجاجي الفخم تلقائياً وديناميكياً
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        });

        // تشغيل واجهة السؤال الأول بمجرد فتح الصفحة تلقائياً
        window.onload = loadQuestion;
    </script>
</body>
</html>
